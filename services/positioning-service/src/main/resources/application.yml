server:
  port: 8081

spring:
  application:
    name: positioning-service
  config:
    import: optional:file:${MUSEUM_LAYOUT_FILE:config/smart_museum/layout.yml}

museum:
  # Place-specific values (building, beacon coordinates) are loaded
  # from external layout file via MUSEUM_LAYOUT_FILE.
  # Keep safe runtime defaults here only.
  beacons:
    default-rssi: -100

  floor:
    strategy: beacon    # beacon | manual | qr

  art:
    nearby-range: 2     # хэдэн grid зай дотор art хайх
    max-results: 2      # хамгийн ойрын хэдэн art явуулах

service:
  enabled: true
  id: positioning-service
  name: "Museum Positioning Service"
  url: http://localhost:8081
  version: 1.0.0
  heartbeat-interval-ms: 30000

registry:
  mqtt:
    broker-url: tcp://localhost:1883
    register-topic: smart-museum-chicago/registry/register
    heartbeat-topic: smart-museum-chicago/registry/heartbeat