<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <title>Smart Museum Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
    h2 { color: #569cd6; margin-bottom: 16px; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .panel { background: #252526; border: 1px solid #3c3c3c; border-radius: 8px; padding: 16px; }
    label { color: #9cdcfe; font-size: 12px; display: block; margin-bottom: 4px; }
    input { width: 100%; background: #1e1e1e; border: 1px solid #3c3c3c; color: #d4d4d4;
            padding: 6px 8px; border-radius: 4px; font-family: monospace; margin-bottom: 8px; }
    button { background: #0e639c; color: white; border: none; padding: 8px 16px;
             border-radius: 4px; cursor: pointer; width: 100%; margin-top: 4px; }
    button:hover { background: #1177bb; }
    button.red { background: #c0392b; }
    button.red:hover { background: #e74c3c; }
    .status { padding: 6px 10px; border-radius: 4px; font-size: 12px; margin-bottom: 8px; }
    .connected { background: #1e3a1e; color: #4ec94e; border: 1px solid #4ec94e; }
    .disconnected { background: #3a1e1e; color: #e74c3c; border: 1px solid #e74c3c; }
    .log { background: #1e1e1e; border: 1px solid #3c3c3c; border-radius: 4px;
           height: 300px; overflow-y: auto; padding: 8px; font-size: 12px; }
    .log-item { margin-bottom: 8px; border-bottom: 1px solid #2d2d2d; padding-bottom: 8px; }
    .log-item .time { color: #808080; font-size: 11px; }
    .log-item .type { color: #569cd6; font-weight: bold; }
    .log-item .floor { color: #4ec94e; }
    .log-item .grid  { color: #ce9178; }
    .log-item .art   { color: #dcdcaa; }
    .beacon-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .beacon-row input { margin-bottom: 0; }
    .add-btn { background: #2d5a27; font-size: 12px; padding: 4px 8px; width: auto; margin-top: 0; }
  </style>
</head>
<body>

<h2>🏛️ Smart Museum — Test UI</h2>
<div class="container">

  <!-- WebSocket panel -->
  <div class="panel">
    <h3 style="color:#ce9178;margin-bottom:12px">WebSocket</h3>
    <label>Device ID</label>
    <input id="deviceId" value="phone-123">
    <button onclick="connect()">Connect</button>
    <button class="red" onclick="disconnect()" style="margin-top:6px">Disconnect</button>
    <div id="wsStatus" class="status disconnected" style="margin-top:10px">● Disconnected</div>

    <h3 style="color:#ce9178;margin:12px 0 8px">Messages</h3>
    <div class="log" id="log">
      <div style="color:#808080">WebSocket messages ...</div>
    </div>
  </div>

  <!-- BLE Signal panel -->
  <div class="panel">
    <h3 style="color:#ce9178;margin-bottom:12px">BLE Signal илгээх</h3>
    <label>Core URL</label>
    <input id="coreUrl" value="http://localhost:8080">

    <label>Beacon signals</label>
    <div id="beacons">
      <div class="beacon-row">
        <input placeholder="beaconId" value="floor-beacon-f1" style="flex:2">
        <input placeholder="rssi" value="-65" style="flex:1">
      </div>
      <div class="beacon-row">
        <input placeholder="beaconId" value="beacon-3" style="flex:2">
        <input placeholder="rssi" value="-72" style="flex:1">
      </div>
      <div class="beacon-row">
        <input placeholder="beaconId" value="beacon-7" style="flex:2">
        <input placeholder="rssi" value="-58" style="flex:1">
      </div>
    </div>
    <button class="add-btn" onclick="addBeacon()" style="margin-bottom:8px">+ add Beacon</button>

    <button onclick="sendBle()" style="margin-top:8px">Send signal</button>

    <div id="sendStatus" style="margin-top:8px;font-size:12px;color:#808080"></div>
  </div>

</div>

<script>
  let ws = null;

  function connect() {
    const deviceId = document.getElementById('deviceId').value;
    const url = `ws://localhost:8080/ws?deviceId=${deviceId}`;
    ws = new WebSocket(url);

    ws.onopen = () => {
      document.getElementById('wsStatus').className = 'status connected';
      document.getElementById('wsStatus').textContent = '● Connected: ' + deviceId;
    };

    ws.onclose = () => {
      document.getElementById('wsStatus').className = 'status disconnected';
      document.getElementById('wsStatus').textContent = '● Not Connected';
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      addLog(msg);
    };
  }

  function disconnect() {
    if (ws) ws.close();
  }

  function addLog(msg) {
    const log = document.getElementById('log');
    const time = new Date().toLocaleTimeString();
    const el = document.createElement('div');
    el.className = 'log-item';

    if (msg.type === 'location_update') {
      const p = msg.payload;
      const arts = p.arts && p.arts.length > 0
        ? p.arts.map(a => `🖼️ ${a.title} — ${a.artist}`).join('<br>')
        : '(art олдсонгүй)';

      el.innerHTML = `
        <div class="time">${time}</div>
        <div class="type">📍 ${msg.type}</div>
        <div class="floor">Давхар: ${p.floorId} &nbsp; X:${p.x} Y:${p.y}</div>
        <div class="art">${arts}</div>
      `;
    } else {
      el.innerHTML = `
        <div class="time">${time}</div>
        <div class="type">${msg.type}</div>
        <div>${JSON.stringify(msg.payload)}</div>
      `;
    }

    log.insertBefore(el, log.firstChild);
  }

  function addBeacon() {
    const div = document.createElement('div');
    div.className = 'beacon-row';
    div.innerHTML = `
      <input placeholder="beaconId" style="flex:2">
      <input placeholder="rssi" value="-70" style="flex:1">
    `;
    document.getElementById('beacons').appendChild(div);
  }

  async function sendBle() {
    const deviceId = document.getElementById('deviceId').value;
    const coreUrl  = document.getElementById('coreUrl').value;
    const rows     = document.querySelectorAll('.beacon-row');
    const readings = [];

    rows.forEach(row => {
      const inputs = row.querySelectorAll('input');
      const beaconId = inputs[0].value.trim();
      const rssi     = parseInt(inputs[1].value);
      if (beaconId && !isNaN(rssi)) readings.push({ beaconId, rssi });
    });

    const body = {
      deviceId,
      timestamp: Date.now(),
      readings
    };

    try {
      const res = await fetch(`${coreUrl}/ble/readings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      document.getElementById('sendStatus').textContent = '✅ ' + JSON.stringify(data);
      document.getElementById('sendStatus').style.color = '#4ec94e';
    } catch (e) {
      document.getElementById('sendStatus').textContent = '❌ ' + e.message;
      document.getElementById('sendStatus').style.color = '#e74c3c';
    }
  }
</script>
</body>
</html>
