services:

  # ── Infrastructure ────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # ── Spring Services ───────────────────────────────────

  positioning-service:
    build: ./services/positioning-service
    container_name: positioning-service
    ports:
      - "8081:8081"
    volumes:
      - ./config:/app/config:ro
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/${MONGO_DB_NAME:-smartmuseum}
      - QDRANT_BASE_URL=${QDRANT_BASE_URL:-http://qdrant:6333}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-fingerprints_museum}
      - REGISTRY_MQTT_BROKER_URL=${MQTT_BROKER_URL:-tcp://mosquitto:1883}
      - REGISTRY_MQTT_REGISTER_TOPIC=${REGISTRY_REGISTER_TOPIC:-smart-museum-chicago/registry/register}
      - REGISTRY_MQTT_HEARTBEAT_TOPIC=${REGISTRY_HEARTBEAT_TOPIC:-smart-museum-chicago/registry/heartbeat}
      - MUSEUM_LAYOUT_FILE=${MUSEUM_LAYOUT_FILE:-/app/config/smart_museum/layout.yml}
    depends_on:
      - qdrant
      - mongodb
      - mosquitto

  artinfo-service:
    build: ./services/artinfo-service
    container_name: artinfo-service
    ports:
      - "8082:8082"
    volumes:
      - ./config:/app/config:ro
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/${MONGO_DB_NAME:-smartmuseum}
      - MUSEUM_LAYOUT_FILE=${MUSEUM_LAYOUT_FILE:-/app/config/smart_museum/layout.yml}
      - REGISTRY_MQTT_BROKER_URL=${MQTT_BROKER_URL:-tcp://mosquitto:1883}
      - REGISTRY_MQTT_REGISTER_TOPIC=${REGISTRY_REGISTER_TOPIC:-smart-museum-chicago/registry/register}
      - REGISTRY_MQTT_HEARTBEAT_TOPIC=${REGISTRY_HEARTBEAT_TOPIC:-smart-museum-chicago/registry/heartbeat}
    depends_on:
      - mongodb
      - mosquitto

  heatmap-service:
    build: ./services/heatmap-service
    container_name: heatmap-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/${MONGO_DB_NAME:-smartmuseum}
      - MUSEUM_MQTT_BROKER_URL=${MQTT_BROKER_URL:-tcp://mosquitto:1883}
      - MUSEUM_MQTT_HEATMAP_TOPIC=${HEATMAP_TOPIC:-smart-museum-chicago/heatmap/grid}
      - REGISTRY_MQTT_BROKER_URL=${MQTT_BROKER_URL:-tcp://mosquitto:1883}
      - REGISTRY_MQTT_REGISTER_TOPIC=${REGISTRY_REGISTER_TOPIC:-smart-museum-chicago/registry/register}
      - REGISTRY_MQTT_HEARTBEAT_TOPIC=${REGISTRY_HEARTBEAT_TOPIC:-smart-museum-chicago/registry/heartbeat}
    depends_on:
      - mongodb
      - mosquitto

  core-service:
    build: ./services/core-service
    container_name: core-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/${MONGO_DB_NAME:-smartmuseum}
      - MUSEUM_SPACE_ID=${SPACE_ID:-smart-museum-chicago}
      - MUSEUM_MQTT_BROKER_URL=${MQTT_BROKER_URL:-tcp://mosquitto:1883}
      - MUSEUM_MQTT_TOPICS_HEATMAP=${HEATMAP_TOPIC:-smart-museum-chicago/heatmap/grid}
      - MUSEUM_MQTT_TOPICS_REGISTRY_REGISTER=${REGISTRY_REGISTER_TOPIC:-smart-museum-chicago/registry/register}
      - MUSEUM_MQTT_TOPICS_REGISTRY_HEARTBEAT=${REGISTRY_HEARTBEAT_TOPIC:-smart-museum-chicago/registry/heartbeat}
      - MUSEUM_SERVICES_POSITIONING_BASE_URL=${POSITIONING_BASE_URL:-http://positioning-service:8081}
      - MUSEUM_SERVICES_ARTINFO_BASE_URL=${ARTINFO_BASE_URL:-http://artinfo-service:8082}
      - MUSEUM_SERVICES_HEATMAP_BASE_URL=${HEATMAP_BASE_URL:-http://heatmap-service:8083}
    depends_on:
      - mongodb
      - mosquitto
      - positioning-service
      - artinfo-service
      - heatmap-service

volumes:
  qdrant_data:
  mongo_data: