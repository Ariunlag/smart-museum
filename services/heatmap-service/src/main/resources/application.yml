server:
  port: 8083

spring:
  application:
    name: heatmap-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/smartmuseum}

museum:
  mqtt:
    broker-url: ${MUSEUM_MQTT_BROKER_URL:tcp://localhost:1883}
    client-id: heatmap-service
    heatmap-topic: smart-museum-chicago/heatmap/grid

  heatmap:
    persist-interval-minutes: 1
    crowd-threshold: 10

service:
  enabled: true
  id: heatmap-service
  name: "Museum Heatmap Service"
  url: http://heatmap-service:8083
  version: 1.0.0
  heartbeat-interval-ms: 30000

registry:
  mqtt:
    broker-url: ${REGISTRY_MQTT_BROKER_URL:tcp://localhost:1883}
    register-topic: smart-museum-chicago/registry/register
    heartbeat-topic: smart-museum-chicago/registry/heartbeat