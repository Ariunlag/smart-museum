site:
  id: smart-museum
  name: Smart Museum
  main-floor: 1

place:
  shape:
    type: Polygon
    crs: grid
    coordinates:
      - [0, 0]
      - [20, 0]
      - [20, 20]
      - [0, 20]
      - [0, 0]

museum:
