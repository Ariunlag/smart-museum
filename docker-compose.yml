version: '3.8'

services:

  # ── Qdrant (vector DB) ────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: qdrant
    ports:
      - "6333:6333"   # REST (browser-с шалгах)
      - "6334:6334"   # gRPC (Java client ашиглана)
    volumes:
      - qdrant_data:/qdrant/storage

  # ── MongoDB ───────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # ── Mosquitto (MQTT broker) ───────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

volumes:
  qdrant_data:
  mongo_data: